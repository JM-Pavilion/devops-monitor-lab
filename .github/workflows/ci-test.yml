name: Python Syntax Check  # 机器人任务的名字

on: [push, pull_request]  # 触发条件：每当你推送代码或发起合并请求

jobs:
  build:
    runs-on: ubuntu-latest  # 告诉 GitHub：给我开一台最新的 Linux 服务器

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 第一步：把我的代码下载到这台服务器上

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # 第二步：安装 Python 环境

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 以后如果有依赖包(如 requests),写在这里

    - name: Check Syntax Error
      run: |
        # 使用 Python 自带的库检查代码是否有语法错误（不运行程序）
        python -m py_compile bot.py
        echo "✅ Syntax Check Passed!"
