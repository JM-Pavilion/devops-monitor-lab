name: Python CI/CD Lab

on: [push]  # 只要有代码推送，就触发任务

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 获取代码
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # 安装 Python 环境

    - name: Check Syntax Error
      run: python -m py_compile bot.py  # 语法自检，防止低级错误

    - name: Build Docker Image
      run: |
        docker build -t devops-monitor-bot:latest .  # 模拟自动化打包
        echo "✅ Docker Image built successfully!"
