name: Docker Build and Push to ACR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # ✨ 登录彻底脱敏
    - name: Log in to Alibaba Cloud ACR
      uses: aliyun/acr-login@v1
      with:
        login-server: ${{ secrets.ALIYUN_REGISTRY }}
        username: ${{ secrets.ALIYUN_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # ✨ 编译与推送彻底脱敏
    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.ALIYUN_REGISTRY }}/jm-lab/jm-monitor:${{ github.sha }} .
        docker tag ${{ secrets.ALIYUN_REGISTRY }}/jm-lab/jm-monitor:${{ github.sha }} ${{ secrets.ALIYUN_REGISTRY }}/jm-lab/jm-monitor:latest
        docker push ${{ secrets.ALIYUN_REGISTRY }}/jm-lab/jm-monitor:${{ github.sha }}
        docker push ${{ secrets.ALIYUN_REGISTRY }}/jm-lab/jm-monitor:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: SSH Deploy to ECS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ECS_HOST }}
        username: root
        password: ${{ secrets.ECS_PASSWORD }}
        script: |
          # 1. 登录阿里云（脱敏）
          echo "${{ secrets.ACR_PASSWORD }}" | docker login --username=${{ secrets.ALIYUN_USERNAME }} --password-stdin ${{ secrets.ALIYUN_REGISTRY }}
          
          # 2. 准备目录与自签名证书（保留）
          mkdir -p /etc/nginx/ssl
          mkdir -p /etc/nginx/sites-enabled
          if [ ! -f /etc/nginx/ssl/jm-monitor.crt ]; then
            openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout /etc/nginx/ssl/jm-monitor.key \
              -out /etc/nginx/ssl/jm-monitor.crt \
              -subj "/C=CN/ST=Zhejiang/L=Hangzhou/O=JM-Lab/OU=Dev/CN=www.jm-monitor.com"
          fi
          
          # 3. 写入 Nginx 路由（保留）
          cat <<EOF > /etc/nginx/sites-enabled/default
          server {
              listen 80;
              listen 443 ssl;
              server_name www.jm-monitor.com jm-monitor.com;
              ssl_certificate /etc/nginx/ssl/jm-monitor.crt;
              ssl_certificate_key /etc/nginx/ssl/jm-monitor.key;
              location / {
                  proxy_pass http://127.0.0.1:10000;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          EOF

          # 4. 进入云端目录并拉取镜像（脱敏）
          mkdir -p /app/jm-compose-lab
          cd /app/jm-compose-lab

          # 💡 动态将密码和域名注入到临时的环境变量中，供 docker compose 使用
          export ALIYUN_REGISTRY="${{ secrets.ALIYUN_REGISTRY }}"
          
          docker pull \$ALIYUN_REGISTRY/jm-lab/jm-monitor:latest
          
          docker compose down || true
          docker compose up -d

          docker image prune -f
          if command -v nginx >/dev/null 2>&1; then
             nginx -t && systemctl restart nginx || service nginx restart || true
          fi
