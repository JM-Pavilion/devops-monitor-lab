services:
  health-monitor:
    image: jminng/jm-monitor:latest # 代码已构建进镜像，无需挂载
    container_name: jm-monitor-service
    environment:
      - TARGET_URL=http://web-target
    env_file:
      - .env
    ports:
      - "8080:10000"
    networks:
      - jm-network
    restart: always
    volumes:
      - ./logs:/app/logs # 只挂载日志，数据持久化
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web-target:
    image: nginx:alpine
    container_name: jm-web-target
    networks:
      - jm-network

networks:
  jm-network:
    driver: bridge
