services:
  # 1. 你的核心监控服务
  health-monitor:
    image: jminng/jm-monitor:latest
    container_name: jm-monitor-service
    environment:
      - TARGET_URL=http://web-target
    env_file:
      - .env
    ports:
      - "8080:10000"
    networks:
      - jm-network
    restart: always
    volumes:
      - ./logs:/app/logs #映射：把当前目录下的 logs 文件夹映射到容器内的 /app/logs 文件夹
      - ./bot.py:/app/bot.py # <--- 新增：挂载代码文件，实现热更新
    # --- 修正点：healthcheck 必须缩进在服务名称下方 ---
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:10000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 2. 模拟一个被监控的 Web 服务
  web-target:
    image: nginx:alpine
    container_name: jm-web-target
    networks:
      - jm-network

networks:
  jm-network:
    driver: bridge
