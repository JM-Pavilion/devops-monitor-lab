version: '3.8'

services:
  health-monitor:
    build: .
    # image: jm/monitor:latest # 这个可以先注释掉，Render 会自己处理构建
    ports:
      - "8082:80"  # 本地依然用 8082 访问，云端会自动映射
    volumes:
      - ./monitor.log:/app/monitor.log
    restart: always

  hello:
    image: nginxdemos/hello:plain-text
    restart: always
