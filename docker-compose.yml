version: '3.8'
services:
  my-web:
    image: jminng/jm-bandit-web:v2
    ports:
      - "8081:80"
    volumes:
      - ./html:/usr/share/nginx/html
    restart: always

  hello:
    image: nginxdemos/hello:plain-text
    restart: always

  # --- 这是今天升级的 DevOps 监控节点 ---
  health-monitor:
    build: .
    ports:
      - "8082:80" # 把容器的80端口映射到你电脑的8082
    volumes:
      - ./monitor.log:/app/monitor.log #新增这一行：把容器里的日志“勾”到桌面上来
    # 核心：安装 Python 并运行我们的无限循环监控脚本

    restart: always
